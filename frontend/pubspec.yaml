name: pdf_tools
description: "A modern PDF Tools application — Merge, Split, Compress, Convert and more."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  lottie: ^3.1.2

  # File handling
  file_picker: ^8.1.2
  dotted_border: ^2.1.0
  flutter_dropzone: ^4.0.1
  image_picker: ^1.1.2
  uuid: ^4.4.0


  # HTTP / API
  http: ^1.2.1
  dio: ^5.4.3+1

  # State management
  provider: ^6.1.2

  # Utilities
  path: ^1.9.0
  url_launcher: ^6.3.0
  shared_preferences: ^2.3.2
  flutter_svg: ^2.0.10+1

  # Download / save files
  universal_html: ^2.2.4
  open_file: ^3.3.2
  printing: ^5.14.2
  pdf: ^3.11.3
  flutter_quill: ^11.5.0
  vsc_quill_delta_to_html: ^1.0.5
  syncfusion_flutter_pdfviewer: ^28.2.7
  syncfusion_flutter_core: ^28.2.7
  cunning_document_scanner: ^1.4.0
  permission_handler: ^12.0.3
  path_provider: ^2.1.5
  image: ^4.8.0
  receive_sharing_intent: ^1.8.1

dependency_overrides:
  win32: ^5.14.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  windows:
    generate: true
  macos:
    generate: true
  image_path: assets/icons/app_icon.png
  adaptive_icon_background: "#6C63FF"
  adaptive_icon_foreground: assets/icons/app_icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
