name: pdf_tools
description: "A modern PDF Tools application — Merge, Split, Compress, Convert and more."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  lottie: ^3.1.2

  # File handling
  file_picker: ^8.1.2
  dotted_border: ^2.1.0
  flutter_dropzone: ^4.0.1

  # HTTP / API
  http: ^1.2.1
  dio: ^5.4.3+1

  # State management
  provider: ^6.1.2

  # Utilities
  path: ^1.9.0
  url_launcher: ^6.3.0
  shared_preferences: ^2.3.2
  flutter_svg: ^2.0.10+1

  # Download / save files
  universal_html: ^2.2.4
  open_file: ^3.3.2
  flutter_quill: ^11.5.0
  vsc_quill_delta_to_html: ^1.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
